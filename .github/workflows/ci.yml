name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      # 181 pre-existing lint errors (mostly no-explicit-any) predate this
      # workflow; tracked for cleanup in a dedicated pass rather than blocking
      # every PR today. Non-blocking until that debt is paid down.
      - name: Lint (non-blocking, tracked as tech debt)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Dummy values so the build step doesn't fail on missing env vars
          # that are only required at runtime, not at build time.
          NEXT_PUBLIC_APP_MODE: demo
